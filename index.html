<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>修学旅行メッセージ</title>

<style>
body{
  margin:0;
  padding:30px;
  background:#f5f5f5;
  font-family:sans-serif;
  line-height:1.9;
  color:#333;
}

#message{
  max-width:800px;
  margin:auto;
  white-space:pre-wrap;
  font-size:1.15em;
}
</style>
</head>

<body>

<div id="message"></div>

<script>

// 現在時刻
const now = new Date();

// ==========================
// 日時設定
// ==========================

// 修学旅行開始
// 5/26 8:50までは「旅行前」
const tripStart = new Date("2026-05-26T08:50:00");

// 特別メッセージ開始
const specialStart = new Date("2026-05-27T10:30:00");

// 特別メッセージ終了
const specialEnd = new Date("2026-05-27T16:00:00");

// 修学旅行終了
const tripEnd = new Date("2026-05-28T17:40:00");

let message = "";

// ==========================
// 修学旅行前
// ==========================
if(now < tripStart){

message = `いよいよ明日から修学旅行！

友達、そして先生方と一緒に過ごすこの3日間は、
きっと一生の思い出になるはずです。

たくさん笑って、たくさん楽しんで、
最高の景色と思い出をみんなでつくろう！

体調と忘れ物には気をつけて、
最高の修学旅行にしよう！`;

}

// ==========================
// 特別メッセージ
// 5/27 10:30〜16:00
// ==========================
else if(now >= specialStart && now < specialEnd){

message = `QRコードを読み込んだあなたは、勘が鋭い！

このメッセージは、
旅行中の今だけ読める特別バージョンです。

自主研修、楽しんでいますか？

鎌倉や横浜での思い出は、
少しずつ増えてきたでしょうか。

戻ってきたら、ぜひ先生に
「こんなことが楽しかった！」
「こんなハプニングがあった！」
など、旅の思い出を聞かせてください！

そして、その時に合言葉を伝えると…
特別なステッカーをプレゼント！

合言葉は――

「○○先生、ありがとうございます。
残りの時間もよろしくお願いします！」

残りの自主研修も、
仲間や先生方と最高の時間にしてください！`;

}

// ==========================
// 修学旅行中
// ==========================
else if(now < tripEnd){

message = `あれ…？
もしかして今、このQRコードをスマホで読み込みましたか…？

修学旅行のしおり、もう一度確認してみましょう。

でも、せっかく開いてくれたので特別に。

今しかない景色、今しかない時間を、
仲間や先生方と全力で楽しんでください！

そして、もし不要物を持ってきてしまったなら、
正直に先生へ伝えて預かってもらいましょう。

「正直に話せること」も、
大人になるための大切な一歩です。

スマホの画面より、
目の前の思い出のほうが、きっと一生残ります。`;

}

// ==========================
// 修学旅行後
// ==========================
else{

message = `修学旅行、お疲れさまでした！

楽しかった思い出は、たくさんできましたか？

まずは、この修学旅行へ送り出してくれた
ご家庭の方への感謝を忘れないでください。

そして何よりの「お土産」は、
買ってきた物だけではありません。

旅先で見た景色、
仲間や先生方と笑い合った時間、
うまくいったことも、失敗したことも含めて――

「こんなことがあったよ！」
と、笑顔で思い出を話すことが、
一番の感謝になります。

この修学旅行は、
みんなに最高の思い出をつくってほしいという思いで、
たくさんの人たちが長い時間をかけて準備してきました。

もちろん、その思い出をつくった主役はみんな自身です。

そして最後に、先生方から。

旅先で少し注意したり、
「早く集合ー！」
「走らないー！」
なんて言った場面もありました。

…まあ、“少し”だったかは人によりますが。

でも、それも全部、
みんなに安全に、そして最高に楽しんでほしかったからです。

この数日間、
みんなと過ごした時間は、
先生たちにとっても本当にかけがえのない時間でした。

そしてこの旅を通して、
先生たちは、みんなのことが前よりもっと好きになりました。

本当です。
うそじゃないです。
たぶんです。

……いや、本当です！

最高の修学旅行をありがとう！

今日はゆっくり休んで、
また学校で元気な顔を見せてくださいね。`;

}

// 表示
document.getElementById("message").innerText = message;

</script>

</body>
</html>
