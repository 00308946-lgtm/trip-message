<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>修学旅行メッセージ</title>

<style>
body{
  margin:0;
  padding:30px;
  background:#f5f5f5;
  font-family:sans-serif;
  line-height:1.9;
  color:#333;
}

#message{
  max-width:800px;
  margin:auto;
  white-space:pre-wrap;
  font-size:1.15em;
}
</style>
</head>

<body>

<div id="message"></div>

<script>

// 現在時刻
const now = new Date();

// ==========================
// 日時設定
// ==========================

// 前日メッセージ終了
const beforeTripEnd = new Date("2026-05-26T00:00:00");

// 当日朝メッセージ終了
const morningMessageEnd = new Date("2026-05-26T08:50:00");

// 特別メッセージ開始
const specialStart = new Date("2026-05-27T10:30:00");

// 特別メッセージ終了
const specialEnd = new Date("2026-05-27T16:00:00");

// 修学旅行終了
const tripEnd = new Date("2026-05-28T17:40:00");

let message = "";

// ==========================
// 前日メッセージ
// ～5/25 23:59
// ==========================
if(now < beforeTripEnd){

message = `いよいよ明日から修学旅行！

友達、そして先生方、仲間と一緒に過ごすこの3日間は、
きっと一生の思い出になるはずです。

たくさん笑って、たくさん楽しんで、
最高の景色と思い出をみんなで作りましょう！

体調と忘れ物には気をつけてね！
今日は早く寝て明日に備えましょう！
最高の修学旅行にしようね！`;

}

// ==========================
// 当日朝メッセージ
// 5/26 0:00〜8:49
// ==========================
else if(now < morningMessageEnd){

message = `おはようございます！

当日の朝にＱＲコードを読み込むなんて鋭い！
そんなあなたに特別な情報を！
ぜひ、自主研修中にレンタルスマホでも読み込んでみてね！
あ、もちろんそれ以外でカメラ機能を使うのはダメですよ！

さて、いよいよ修学旅行当日です！

体調はどうかな？
朝ごはんはしっかり食べましたか？

今日はたくさんの思い出が始まる特別な1日。

友達や先生方と過ごす時間を、
思いきり楽しんできましょう！

忘れ物、集合時間、体調確認も忘れずに！

それでは―
空港で待っています！`;

}

// ==========================
// 特別メッセージ
// 5/27 10:30〜15:59
// ==========================
else if(now >= specialStart && now < specialEnd){

message = `QRコードを読み込んだあなたは、勘が鋭い！

このメッセージは、
旅行中の今だけ読める特別バージョンです。

自主研修、楽しんでいますか？

鎌倉や横浜での思い出は、
これからたくさん作るところ？　それとも無事終えてたくさんできたでしょうか。

戻ってきたら、ぜひ先生に
「こんなことが楽しかった！」
「こんなハプニングがあった！」
など、旅の思い出を聞かせてください！

そして、その時に合言葉を伝えると…
特別なステッカーをプレゼント！

合言葉は――

「〇〇（担任の名前）先生、ありがとうございます。
残りの時間もよろしくお願いします！」

残りの修学旅行も、
仲間や先生方と最高の時間にしてください！`;

}

// ==========================
// 修学旅行中
// 5/26 8:50〜5/27 10:29
// 5/27 16:00〜5/28 17:39
// ==========================
else if(now < tripEnd){

message = `あれ…？
もしかして今、このQRコードをスマホで読み込みましたか…？

修学旅行のしおり、もう一度確認してみましょう。

でも、せっかく開いてくれたので特別に。

今しかない景色、今しかない時間を、
仲間や先生方と全力で楽しんでください！

そして、もし不要物を持ってきてしまったなら、
正直に先生へ伝えて預かってもらいましょう。

「正直に話せること」も、
大人になるための大切な一歩です。

スマホの画面より、
目の前の思い出のほうが、きっと一生残ります。`;

}

// ==========================
// 修学旅行後
// 5/28 17:40〜
// ==========================
else{

message = `修学旅行、お疲れさまでした！

楽しかった思い出は、たくさんできましたか？

まずは、この修学旅行へ送り出してくださった
保護者の皆さま、本当にありがとうございました。

修学旅行に向けた準備や日々の体調管理、
様々な面での支えがあったからこそ、
子どもたちは安心してこの3日間を過ごすことができました。

学校だけでは作れない思い出を、
ご家庭の皆さまと一緒に作ることができたこと、
心より感謝申し上げます。

そして、生徒のみなさんへ。

この修学旅行で得たものは、
お土産として買ってきた物だけではありません。

旅先で見た景色、
仲間や先生方と笑い合った時間、
うまくいったことも、失敗したことも含めて――

その全部が、
これから先もきっと残り続ける大切な思い出です。

ぜひご家庭でも、
「こんなことがあったよ！」
「ここが楽しかった！」
と、たくさん思い出話をしてください。

その時間が、
きっと一番のお土産になるはずです。

この修学旅行は、
みんなに最高の思い出を作ってほしいという思いで、
たくさんの人たちが長い時間をかけて準備してきました。

もちろん、その思い出を作った主役はみんな自身です。
立派でしたよ！

そして最後に、先生方から。

旅先で少し注意したり、
「早く集合する！」
「走らない！」
「話をちゃんと聞く！」
なんて言った場面もありました。

…まあ、少しか多かったかは人によりますが。

でも、それも全部、
みんなに安全に、そして最高に楽しんでほしかったからです。

この数日間、
みんなと過ごした時間は、
先生たちにとっても本当にかけがえのない時間でした。

そしてこの旅を通して、
先生たちは、みんなのことが前よりもっと好きになりました。

本当です。
うそじゃないですよ。

最高の修学旅行をありがとう！

今日はゆっくり休んで、
また学校で元気な顔を見せてくださいね。`;

}

// 表示
document.getElementById("message").innerText = message;

</script>

</body>
</html>
